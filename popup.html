<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode Summarizer</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      opencode / summarize
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">checking...</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel hidden" id="settingsPanel">
    <div class="setting-row">
      <label>⚙ OpenCode Server URL</label>
      <input type="text" id="serverUrl" placeholder="http://localhost:4096" />
    </div>
    <div class="setting-row">
      <label>语言 / Language</label>
      <select id="outputLang">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="auto">与文章相同</option>
      </select>
    </div>
    <button class="save-btn" id="saveSettings">保存设置</button>
  </div>

  <!-- Page Info -->
  <div class="page-info">
    <div class="page-icon">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <path d="M2 2h12v12H2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="page-title" id="pageTitle">Loading...</div>
  </div>

  <!-- Action Buttons -->
  <div class="action-area">
    <div class="action-buttons">
      <button class="action-btn" id="btnRecipe" data-prompt="请从这份视频字幕中提取完整的菜谱，严格按以下结构输出：&#10;&#10;一、菜名&#10;（如字幕中有多道菜，逐一列出）&#10;&#10;二、食材清单&#10;• 主料：名称 + 用量（如&quot;五花肉 500g&quot;）&#10;• 辅料/配菜：名称 + 用量&#10;• 调料：名称 + 用量（如&quot;生抽 2勺&quot;、&quot;盐 适量&quot;）&#10;注意：字幕中提到的所有食材和调料都必须列出，不要遗漏。用量如果字幕未明确说明，标注&quot;适量&quot;。&#10;&#10;三、详细步骤&#10;按操作顺序编号，每步必须包含：&#10;• 具体操作（切法、下锅顺序等）&#10;• 火候（大火/中火/小火）&#10;• 时间（如&quot;煮3分钟&quot;、&quot;焖20分钟&quot;）&#10;• 关键判断标准（如&quot;炒至变色&quot;、&quot;煮到筷子能插透&quot;）&#10;&#10;四、小贴士&#10;提取字幕中提到的技巧、注意事项、替代方案、常见错误等。&#10;&#10;要求：&#10;- 语言精简清晰，方便照着做菜&#10;- 不要编造字幕中没有的信息&#10;- 如果字幕中有时间戳对应的关键步骤，标注对应时间点">🍳 整理菜谱</button>
      <button class="action-btn" id="btnSummary" data-prompt="请对内容进行分段总结，遵循以下规则：&#10;&#10;一、分段原则&#10;以&quot;内容推进节点&quot;分段，而不是固定时长。出现以下情况之一即可切段：&#10;• 话题改变&#10;• 论点推进或结论出现&#10;• 叙事阶段转换&#10;• 举例 → 总结 → 延伸 的结构变化&#10;&#10;二、每段输出内容必须包含&#10;【阶段编号】&#10;【时间范围】（如有字幕时间戳则严格引用）&#10;【本段核心内容】（一句话概括本段在整体中的作用）&#10;【详细要点】按逻辑顺序列出内容推进过程，保留关键事实、因果关系、推理链条。若有观点/结论/预测需明确写出。&#10;&#10;三、总结要求&#10;- 不要复述原文，而是重构逻辑&#10;- 不要省略信息密集段&#10;- 保留&quot;为什么讲这一段&quot;的结构意义&#10;- 若出现反转、递进、总结段，必须标明&#10;&#10;四、整体要求&#10;输出应呈现为&quot;逐阶段时间轴解析&quot;，而不是普通摘要。若内容较长，请完整覆盖至结尾。">📊 详细总结</button>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-status" id="progressStatus"></div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <button class="stop-btn" id="stopBtn" title="停止">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none"><rect x="3" y="3" width="10" height="10" rx="1" fill="currentColor"/></svg>
      </button>
    </div>
  </div>

  <!-- Error Box -->
  <div class="error-box" id="errorBox"></div>

  <!-- Result Area -->
  <div class="result-area" id="resultArea">
    <div class="result-header">
      <div class="result-label">
        <div class="spinner" id="spinner"></div>
        结果
      </div>
      <div class="result-actions">
        <button class="icon-btn" id="copyBtn" title="复制结果">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 5V3.5A1.5 1.5 0 009.5 2h-7A1.5 1.5 0 001 3.5v7A1.5 1.5 0 002.5 12H5" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button class="icon-btn" id="clearBtn" title="清空">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
            <path d="M2 4h12M5 4V2.5A1.5 1.5 0 016.5 1h3A1.5 1.5 0 0111 2.5V4M6 7v5M10 7v5M3 4l1 9.5A1.5 1.5 0 005.5 15h5a1.5 1.5 0 001.5-1.5L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="result-content" id="resultContent"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-info" id="footerInfo">opencode serve --cors chrome-extension://</div>
    <div class="copied-toast" id="copiedToast">✓ 已复制</div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
